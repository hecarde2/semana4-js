<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - Semana 4 JavaScript</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-group button {
            flex: 1;
            margin: 0;
        }

        button.delete-btn {
            background: #e74c3c;
            padding: 8px 12px;
            font-size: 14px;
            width: auto;
            margin: 0;
        }

        button.delete-btn:hover {
            background: #c0392b;
        }

        button.edit-btn {
            background: #3498db;
            padding: 8px 12px;
            font-size: 14px;
            width: auto;
            margin: 0;
        }

        button.edit-btn:hover {
            background: #2980b9;
        }

        .message {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        ul {
            list-style: none;
            margin-top: 30px;
        }

        li {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .product-price {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-description {
            color: #666;
            font-size: 14px;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .stats {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .stats p {
            margin: 5px 0;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Gestión de Productos</h1>

        <!-- Mensaje de retroalimentación -->
        <div id="mensaje" class="message"></div>

        <!-- Estadísticas -->
        <div class="stats">
            <p><strong>Total de productos:</strong> <span id="totalProductos">0</span></p>
            <p><strong>Valor total en inventario:</strong> $<span id="valorTotal">0.00</span></p>
        </div>

        <!-- Formulario de captura -->
        <form id="formulario">
            <div class="form-group">
                <label for="nombre">Nombre del Producto *</label>
                <input 
                    type="text" 
                    id="nombre" 
                    placeholder="Ej: Laptop Dell"
                    required
                >
            </div>

            <div class="form-group">
                <label for="precio">Precio ($) *</label>
                <input 
                    type="number" 
                    id="precio" 
                    placeholder="Ej: 999.99"
                    step="0.01"
                    min="0"
                    required
                >
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea 
                    id="descripcion" 
                    placeholder="Descripción del producto..."
                ></textarea>
            </div>

            <div class="button-group">
                <button type="submit" id="btnAgregar">Agregar Producto</button>
                <button type="button" id="btnSincronizar">🔄 Sincronizar con API</button>
            </div>
        </form>

        <!-- Lista de productos -->
        <h2 style="margin-top: 40px; margin-bottom: 20px; color: #333;">Productos Registrados:</h2>
        <ul id="listaProductos">
            <li class="empty-message">No hay productos registrados</li>
        </ul>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
